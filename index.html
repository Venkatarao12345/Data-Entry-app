<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Data Entry</title>
    <style>
        :root {
            --bg-color: #212529;
            /* Dark Mode Default BG Base */
            --bg-gradient-start: #212529;
            --bg-gradient-end: #343a40;
            --card-bg: #343a40;
            --card-border: #495057;
            --primary: #f8f9fa;
            /* High contrast for dark mode */
            --primary-hover: #e9ecef;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --danger: #dc3545;
            /* Standard bootstrap danger */
            --success: #198754;
            /* Standard bootstrap success */
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --glass-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);

            /* Palette References for consistency */
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
        }

        body.light-theme {
            --bg-color: #f8f9fa;
            --bg-gradient-start: #f8f9fa;
            --bg-gradient-end: #dee2e6;
            --card-bg: #ffffff;
            --card-border: #dee2e6;
            --primary: #343a40;
            /* Dark button for light mode */
            --primary-hover: #212529;
            --text-main: #212529;
            --text-muted: #6c757d;
            --glass-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Access Utility */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .justify-center {
            justify-content: center;
        }

        .gap-2 {
            gap: 0.5rem;
        }

        .gap-4 {
            gap: 1rem;
        }

        .w-full {
            width: 100%;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .mb-6 {
            margin-bottom: 1.5rem;
        }

        .p-2 {
            padding: 0.5rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .p-6 {
            padding: 1.5rem;
        }

        /* Components */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--bg-color);
            /* Contrast Text */
            border: 1px solid var(--primary);
        }

        /* Specific override for light mode primary button text if needed, 
           but relying on vars: Light Mode Primary=DarkGray -> Text=White (set below) */
        body.light-theme .btn-primary {
            color: #ffffff;
        }

        /* Dark Mode Primary is White/LightGray -> Text must be dark */
        body:not(.light-theme) .btn-primary {
            color: #212529;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: white;
        }

        .btn-secondary {
            background-color: var(--gray-100);
            color: var(--gray-900);
            border: 1px solid var(--gray-400);
        }

        .btn-secondary:hover {
            background-color: var(--gray-200);
        }

        /* Resizing Styles */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            /* Wider hit area */
            cursor: col-resize;
            z-index: 20;
            transition: background 0.2s;
        }

        .resize-handle:hover,
        .resize-handle.active {
            background: rgba(59, 130, 246, 0.5);
            /* Visual feedback */
        }

        .row-resize-handle {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            cursor: row-resize;
            z-index: 20;
            background: transparent;
        }

        .row-resize-handle:hover {
            background: rgba(59, 130, 246, 0.5);
        }

        /* Cursor Locks */
        body.resizing-col {
            cursor: col-resize !important;
        }

        body.resizing-row {
            cursor: row-resize !important;
        }

        body.resizing-col * {
            user-select: none !important;
        }

        /* Prevent text selection */
        body.resizing-row * {
            user-select: none !important;
        }

        /* Tab Navigation Styles */
        .tab-btn {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 0.25rem 0.25rem 0 0;
            /* Tab shape */
            border: 1px solid transparent;
            /* default */
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Active Tab: White BG, Black Text, Bottom Border Dark */
        .tab-btn.active {
            background-color: #ffffff;
            color: #212529;
            border-bottom: 2px solid #343a40;
            border-top: 1px solid transparent;
            /* Clean look */
        }

        body:not(.light-theme) .tab-btn.active {
            background-color: var(--primary);
            color: var(--bg-color);
            border-bottom: 2px solid var(--primary);
        }

        /* Inactive Tab: Light Gray BG, Gray Text */
        .tab-btn.inactive {
            background-color: var(--gray-200);
            /* #e9ecef */
            color: var(--gray-700);
            /* #495057 */
        }

        body:not(.light-theme) .tab-btn.inactive {
            background-color: rgba(255, 255, 255, 0.05);
            /* Subtle in dark */
            color: var(--text-muted);
        }

        .tab-btn:hover {
            opacity: 0.9;
        }

        /* Neutralize Danger to keep Palette Strict */
        .btn-danger {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--gray-600);
        }

        .btn-danger:hover {
            background-color: var(--gray-800);
            color: white;
            border-color: var(--gray-800);
        }

        body:not(.light-theme) .btn-danger:hover {
            background-color: var(--gray-200);
            color: var(--gray-900);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            background-color: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
        }

        /* STRICT INPUT RULES: White BG, Black Text ALWAYS */
        .input {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--gray-400);
            /* Medium Light Gray */
            background: #ffffff !important;
            color: #212529 !important;
            width: 100%;
            transition: border-color 0.2s;
        }

        /* Dark Mode Border Adjustment */
        body:not(.light-theme) .input {
            border-color: var(--gray-500);
        }

        .input:focus {
            border-color: var(--gray-700);
            outline: none;
            box-shadow: none;
            /* No glow */
        }

        ::placeholder {
            color: var(--gray-500) !important;
            opacity: 1;
        }

        .label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            box-shadow: var(--glass-shadow);
        }

        /* Layouts */
        #login-view {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        #dashboard-view {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1rem;
            height: 100%;
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .form-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            border-radius: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
        }

        table {
            min-width: 100%;
            width: max-content;
            /* Allow growth beyond container */
            table-layout: fixed;
            /* Respect column widths */
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-main);
            white-space: nowrap;
            /* Prevent wrapping */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            background: var(--gray-200);
            /* #e9ecef */
            position: sticky;
            top: 0;
            color: var(--gray-800);
            /* #343a40 */
            font-weight: 600;
            z-index: 10;
        }

        /* Dark Mode Table Header Override */
        body:not(.light-theme) th {
            background: var(--gray-800);
            color: var(--text-main);
            /* #f8f9fa */
        }

        tr:hover {
            background: var(--gray-100);
            /* #f8f9fa */
        }

        body:not(.light-theme) tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-500);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            animation: slideIn 0.3s ease;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Edit Mode Enhancements */
        .editing-row {
            background: var(--gray-200) !important;
            border-left: 3px solid var(--gray-800);
        }

        body:not(.light-theme) .editing-row {
            background: rgba(255, 255, 255, 0.1) !important;
            border-left: 3px solid var(--primary);
        }

        .input.is-dirty {
            border-color: var(--gray-600) !important;
            background: #fff !important;
            /* Keep white */
        }

        .input.is-invalid {
            border-color: var(--danger) !important;
            background: #fff !important;
        }

        /* Standardized Icon Styles */
        .btn-icon,
        .btn-icon-neutral {
            filter: grayscale(100%);
            transition: all 0.2s ease;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .btn-icon:hover,
        .btn-icon-neutral:hover {
            filter: none;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        /* Filter & Sort UI */
        .filter-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-left: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            color: var(--text-muted);
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .filter-icon:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
        }

        body:not(.light-theme) .filter-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-icon.active {
            color: var(--text-main);
            background: var(--gray-300);
            font-weight: bold;
        }

        body:not(.light-theme) .filter-icon.active {
            background: var(--gray-700);
        }

        .filter-panel {
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 280px;
            max-height: 400px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
            font-size: 0.9rem;
            overflow: hidden;
        }

        .filter-panel-header {
            padding: 0.75rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            background: var(--card-bg);
        }

        .filter-sort-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            color: var(--text-main);
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }

        .filter-sort-btn:hover {
            background: var(--gray-200);
        }

        body:not(.light-theme) .filter-sort-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-search {
            /* Input style override for filter search specifically if needed to match global input */
            background: #ffffff !important;
            border: 1px solid var(--gray-400);
            padding: 0.4rem;
            border-radius: 4px;
            color: #212529 !important;
            width: 100%;
        }

        .filter-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            background: var(--card-bg);
            /* Match card bg */
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
        }

        .filter-item:hover {
            background: var(--gray-200);
        }

        body:not(.light-theme) .filter-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-actions {
            padding: 0.75rem;
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            background: var(--card-bg);
        }

        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background: transparent;
            z-index: 20;
        }

        .resize-handle:hover,
        .resize-handle.active {
            background: var(--primary);
        }

        .cell-wrap {
            white-space: normal !important;
            word-wrap: break-word;
        }

        .cell-nowrap {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
            /* Force ellipsis logic */
        }
    </style>
</head>

<body>

    <!-- App Container -->
    <div id="app"></div>

    <script>
        /**
         * CLEAN DATA ENTRY FORM - Single File Application
         * Handles Auth, Dynamic Forms, Data Persistence (localStorage), and Export.
         */

        // --- CONSTANTS ---
        const DB_KEYS = {
            USERS: 'app_v8_users',
            TABS: 'app_v8_tabs', // New Key for Tabs
            SESSION: 'app_v8_session',
            INSTALL_FLAG: 'app_v8_installed' // Flag to detect first run
        };

        const MAX_USERS = 20;

        // --- SECURITY UTILS ---
        const Security = {
            // Basic obfuscation to prevent casual reading of source code strings
            // Reverses Base64 + Rot13 combo (Not true encryption, but hides from plain sight)
            deobfuscate(str) {
                return atob(str).split('').map(c =>
                    /[a-zA-Z]/.test(c) ? String.fromCharCode(c.charCodeAt(0) + (c.toLowerCase() < 'n' ? 13 : -13)) : c
                ).join('');
            },

            async hash(str) {
                const msgBuffer = new TextEncoder().encode(str);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }
        };

        // Secrets (Obfuscated) -> admin / admin@123
        const SECRETS = {
            // "admin" -> Rot13 "nqzva" -> B64
            ADMIN_ID: 'bnF6dmE=',
            // "admin@123" -> Rot13 "nqzva@123" -> B64
            ADMIN_PASS: 'bnF6dmFAMTIz',
            // "Guest" -> Rot13 "Thrfg" -> B64
            GUEST_ID: 'VGhyZmc=',
            // "Guest@123" -> Rot13 "Thrfg@123" -> B64
            GUEST_PASS: 'VGhyZmdAMTIz'
        };

        // --- STATE MANAGEMENT ---
        const State = {
            users: [],
            tabs: [],
            activeTabId: null,
            currentUser: null,
            theme: localStorage.getItem('app_v8_theme') || 'dark',

            toggleTheme() {
                this.theme = this.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('app_v8_theme', this.theme);
                this.applyTheme();
                Router.render(); // Re-render to update icons
            },

            applyTheme() {
                if (this.theme === 'light') document.body.classList.add('light-theme');
                else document.body.classList.remove('light-theme');
            },

            // Getters/Setters to Proxy Active Tab
            get activeTab() { return this.tabs.find(t => t.id === this.activeTabId); },
            get schema() { return this.activeTab ? this.activeTab.schema : []; },
            set schema(val) { if (this.activeTab) this.activeTab.schema = val; },
            get data() { return this.activeTab ? this.activeTab.data : []; },
            set data(val) { if (this.activeTab) this.activeTab.data = val; },

            // --- FILTER & SORT LOGIC ---
            get filteredData() {
                if (!this.activeTab) return [];
                let d = [...this.activeTab.data];

                // 1. Apply Filters
                if (this.activeTab.filters) {
                    Object.entries(this.activeTab.filters).forEach(([colId, allowedValues]) => {
                        // If null/undefined, it means NO filter active (all allowed)
                        if (allowedValues && Array.isArray(allowedValues)) {
                            // Excel Logic: Show rows where value is in the allowed list
                            // We need to handle type coercion carefully or use formatted values? 
                            // Standard: Raw values check.
                            d = d.filter(row => {
                                const val = row[colId];
                                // Handle 'Blanks' if we want to get fancy, but simple Includes for now
                                // If allowedValues includes special token for blank? 
                                // For now, just direct match.
                                // If value is undefined in row, treat as empty string or null
                                const checkVal = (val === undefined || val === null) ? '' : val;
                                return allowedValues.includes(checkVal);
                            });
                        }
                    });
                }

                // 2. Apply Sort
                if (this.activeTab.sort) {
                    const { colId, direction } = this.activeTab.sort;
                    const col = this.schema.find(c => c.id === colId);
                    if (col) {
                        d.sort((a, b) => {
                            let valA = a[colId];
                            let valB = b[colId];

                            // Handle nulls/undefined - usually at bottom? Excel varies.
                            if (valA === undefined || valA === null) valA = '';
                            if (valB === undefined || valB === null) valB = '';

                            if (col.type === 'number') {
                                valA = parseFloat(valA) || 0;
                                valB = parseFloat(valB) || 0;
                            } else {
                                valA = String(valA).toLowerCase();
                                valB = String(valB).toLowerCase();
                            }

                            if (valA < valB) return direction === 'asc' ? -1 : 1;
                            if (valA > valB) return direction === 'asc' ? 1 : -1;
                            return 0;
                        });
                    }
                }

                return d;
            },

            setFilter(colId, values) {
                if (!this.activeTab) return;
                if (!this.activeTab.filters) this.activeTab.filters = {};

                // If values is null, clear filter
                if (values === null) {
                    delete this.activeTab.filters[colId];
                } else {
                    this.activeTab.filters[colId] = values;
                }
                this.saveTabs();
                Router.render();
            },

            clearFilter(colId) {
                this.setFilter(colId, null);
            },

            clearAllFilters() {
                if (!this.activeTab) return;
                this.activeTab.filters = {};
                this.saveTabs();
                Router.render();
            },

            setSort(colId, direction) {
                if (!this.activeTab) return;
                if (!direction) {
                    this.activeTab.sort = null;
                } else {
                    this.activeTab.sort = { colId, direction };
                }
                this.saveTabs();
                Router.render();
            },

            async init() {
                // HARD-CODED PRESETS
                this.adminIdRaw = Security.deobfuscate(SECRETS.ADMIN_ID);
                this.guestIdRaw = Security.deobfuscate(SECRETS.GUEST_ID);

                // --- FIRST-RUN RESET ---
                const isInstalled = localStorage.getItem(DB_KEYS.INSTALL_FLAG);
                if (!isInstalled) {
                    console.log("First Run: Cleaning...");
                    localStorage.clear();

                    // Create Guest User ONLY
                    const guestPass = Security.deobfuscate(SECRETS.GUEST_PASS);
                    const guestHash = await Security.hash(guestPass);

                    // Note: Default Admin is NOT added to this.users (Persistence Rule)
                    this.users = [
                        { id: this.guestIdRaw, password: guestHash, role: 'user', createdBy: 'system' }
                    ];
                    this.saveUsers();
                    localStorage.setItem(DB_KEYS.INSTALL_FLAG, 'true');

                    // Default Tab (Removed - will be created per user on first login)
                    // this.tabs = [{ id: 'tab_default', name: 'Sheet 1', schema: [{ id: 'name', label: 'Name', type: 'text' }], data: [] }];
                    // this.activeTabId = 'tab_default';
                    // this.saveTabs();

                } else {
                    // Normal Load
                    const storedUsers = localStorage.getItem(DB_KEYS.USERS);
                    this.users = storedUsers ? JSON.parse(storedUsers) : [];

                }

                // Check Session
                const session = sessionStorage.getItem(DB_KEYS.SESSION);
                if (session) {
                    this.currentUser = JSON.parse(session);
                    this.loadUserData();
                }
            },

            saveUsers() { localStorage.setItem(DB_KEYS.USERS, JSON.stringify(this.users)); },

            loadUserData() {
                if (!this.currentUser) return;

                const userKey = `app_v8_data_${this.currentUser.id}`;
                const storedData = localStorage.getItem(userKey);

                if (storedData) {
                    this.tabs = JSON.parse(storedData);
                    this.activeTabId = this.tabs.length > 0 ? this.tabs[0].id : null;
                } else {
                    // MIGRATION / INITIALIZATION
                    // If Default Admin, try to migrate legacy global data
                    if (this.currentUser.adminType === 'default') {
                        const legacyData = localStorage.getItem(DB_KEYS.TABS);
                        if (legacyData) {
                            console.log("Migrating legacy data to Default Admin...");
                            this.tabs = JSON.parse(legacyData);
                            this.activeTabId = this.tabs.length > 0 ? this.tabs[0].id : null;
                            this.saveTabs(); // Save to new key
                            return;
                        }
                    }

                    // Default Empty Workspace for everyone else (or if no legacy data)
                    this.tabs = [{ id: 'tab_default', name: 'Sheet 1', schema: [{ id: 'name', label: 'Name', type: 'text' }], data: [] }];
                    this.activeTabId = 'tab_default';
                    this.saveTabs();
                }
            },

            saveTabs() {
                if (this.currentUser) {
                    const userKey = `app_v8_data_${this.currentUser.id}`;
                    localStorage.setItem(userKey, JSON.stringify(this.tabs));
                }
            },
            saveSchema() { this.saveTabs(); },
            saveData() { this.saveTabs(); },

            normalizeUserId(userId) {
                return String(userId || '').trim();
            },

            findUserById(userId) {
                const targetId = this.normalizeUserId(userId).toLowerCase();
                return this.users.find(u => this.normalizeUserId(u.id).toLowerCase() === targetId);
            },

            // --- CORE DATA INTEGRITY ---
            cleanValue(value, col) {
                if (value === null || value === undefined) return '';
                let cleaned = String(value);
                const opts = col.options || {};

                // Auto Trim
                if (col.type === 'text' && opts.autoTrim) {
                    cleaned = cleaned.trim();
                }

                // Casing Rules
                if (col.type === 'text' && opts.casing) {
                    if (opts.casing === 'upper') cleaned = cleaned.toUpperCase();
                    if (opts.casing === 'lower') cleaned = cleaned.toLowerCase();
                    if (opts.casing === 'title') {
                        cleaned = cleaned.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
                    }
                }

                return cleaned;
            },

            // --- TAB MANAGEMENT ---
            addTab(name) {
                if (this.tabs.length >= 10) {
                    alert('Maximum of 10 sheets allowed.');
                    return;
                }
                if (this.tabs.some(t => t.name.toLowerCase() === name.toLowerCase())) {
                    alert('A tab with this name already exists. Please choose a unique name.');
                    return;
                }
                const newTab = { id: 'tab_' + Date.now(), name: name, schema: [], data: [] };
                this.tabs.push(newTab);
                this.switchTab(newTab.id);
            },

            deleteTab(id) {
                if (this.tabs.length <= 1) {
                    alert('Cannot delete the last existing sheet.');
                    return;
                }
                if (!confirm(`Are you sure you want to delete "${this.activeTab.name}"? This cannot be undone.`)) return;

                const idx = this.tabs.findIndex(t => t.id === id);
                if (idx !== -1) {
                    this.tabs.splice(idx, 1);
                    const nextTab = this.tabs[idx - 1] || this.tabs[0];
                    this.switchTab(nextTab.id);
                }
            },

            switchTab(id) {
                this.activeTabId = id;
                this.selectedRows.clear();
                this.saveTabs();
                Router.render();
            },

            renameTab(name) {
                if (this.activeTab) {
                    if (this.tabs.some(t => t.id !== this.activeTabId && t.name.toLowerCase() === name.toLowerCase())) {
                        alert('A tab with this name already exists.');
                        return;
                    }
                    this.activeTab.name = name;
                    this.saveTabs();
                    Router.render();
                }
            },

            async login(userId, password, selectedRole) {
                const normalizedUserId = this.normalizeUserId(userId);
                const hash = await Security.hash(password);

                // 1. CUSTOM ADMIN / USER CHECK (LocalStorage)
                // Case-insensitive ID check
                const userMatch = this.findUserById(normalizedUserId);

                if (userMatch) {
                    if (userMatch.password === hash) {
                        if (userMatch.role !== selectedRole) {
                            return { success: false, error: `Account exists but is not an ${selectedRole}` };
                        }
                        this.currentUser = { ...userMatch, adminType: 'custom' }; // Mark as Custom
                        sessionStorage.setItem(DB_KEYS.SESSION, JSON.stringify(this.currentUser));
                        this.loadUserData();
                        return { success: true };
                    } else {
                        return { success: false, error: 'Incorrect Password.' };
                    }
                }

                // 2. DEFAULT ADMIN FALLBACK (Secrets)
                // Only if looking for Admin and not found in custom users
                if (selectedRole === 'admin') {
                    // Check Hardcoded Default Admin
                    const defaultAdminId = Security.deobfuscate(SECRETS.ADMIN_ID);
                    if (normalizedUserId.toLowerCase() === defaultAdminId.toLowerCase()) {
                        const defaultAdminPass = Security.deobfuscate(SECRETS.ADMIN_PASS);
                        const defaultHash = await Security.hash(defaultAdminPass);

                        if (hash === defaultHash) {
                            this.currentUser = {
                                id: defaultAdminId,
                                role: 'admin',
                                adminType: 'default', // Mark as Default
                                createdBy: 'system'
                            };
                            sessionStorage.setItem(DB_KEYS.SESSION, JSON.stringify(this.currentUser));
                            this.loadUserData();
                            return { success: true };
                        } else {
                            return { success: false, error: 'Incorrect Password.' };
                        }
                    }
                }

                return { success: false, error: 'User ID Not Found.' };
            },

            logout() {
                this.currentUser = null;
                this.tabs = [];
                this.activeTabId = null;
                sessionStorage.removeItem(DB_KEYS.SESSION);
                Router.render();
            },

            async addUser(newId, newPassword) {
                if (this.currentUser.role !== 'admin') throw new Error("Unauthorized");
                const normalizedId = this.normalizeUserId(newId);
                if (!normalizedId) throw new Error("User ID cannot be empty.");

                // Partitioning Logic: Count users created by THIS admin
                const myUsers = this.users.filter(u => u.createdBy === this.currentUser.id && u.role === 'user');
                if (myUsers.length >= 20) throw new Error("Your max user limit (20) reached.");

                if (this.findUserById(normalizedId)) throw new Error("User ID already exists.");

                const hash = await Security.hash(newPassword);
                // Tag user with creating admin ID
                this.users.push({ id: normalizedId, password: hash, role: 'user', createdBy: this.currentUser.id });
                this.saveUsers();
            },

            async addCustomAdmin(newId, newPassword) {
                if (this.currentUser.role !== 'admin') throw new Error("Unauthorized");
                const normalizedId = this.normalizeUserId(newId);
                if (!normalizedId) throw new Error("Admin ID cannot be empty.");

                // Prevent creating an admin with the same ID as the hardcoded default (confusion avoidance)
                const defaultAdminId = Security.deobfuscate(SECRETS.ADMIN_ID);
                if (normalizedId.toLowerCase() === defaultAdminId.toLowerCase()) {
                    throw new Error("Cannot create a Custom Admin with the Default Admin ID.");
                }

                if (this.findUserById(normalizedId)) throw new Error("User ID already exists.");

                const hash = await Security.hash(newPassword);
                // Custom Admin is stored in localStorage
                this.users.push({
                    id: normalizedId,
                    password: hash,
                    role: 'admin',
                    adminType: 'custom',
                    createdBy: this.currentUser.id
                });
                this.saveUsers();
            },

            deleteUser(userId) {
                if (this.currentUser.role !== 'admin') throw new Error("Unauthorized");

                // 1. HARD-CODED PRIMARY ADMIN - NOT DELETABLE
                const defaultAdminId = Security.deobfuscate(SECRETS.ADMIN_ID);
                if (this.normalizeUserId(userId).toLowerCase() === defaultAdminId.toLowerCase()) throw new Error("Default Admin cannot be deleted.");

                const user = this.findUserById(userId);

                // Allow deleting Custom Admins if created by self (or if we are super admin? 
                // Requirement says "Never reset custom admin data", implies care.
                // But generally an Admin should be able to clean up if they created it?
                // For now, allow deleting if it's in the list and check ownership/role.
                if (!user) throw new Error("User not found.");

                // Self-deletion check
                if (this.normalizeUserId(user.id).toLowerCase() === this.normalizeUserId(this.currentUser.id).toLowerCase()) throw new Error("Cannot delete yourself.");

                // Only allow deleting OWN users/admins
                // If I am Default Admin, I likely 'created' everyone or at least can manage everyone?
                // The prompt says "Authenticate custom admins first...". 
                // Let's assume strict ownership for safety.
                if (user.createdBy && user.createdBy !== this.currentUser.id && this.currentUser.adminType !== 'default') {
                    throw new Error("Cannot delete users created by another Admin.");
                }

                this.users = this.users.filter(u => this.normalizeUserId(u.id).toLowerCase() !== this.normalizeUserId(user.id).toLowerCase());
                this.saveUsers();
            },

            async updateUserPassword(userId, newPassword) {
                // 1. DEFAULT ADMIN - IMMUTABLE
                // If 'adminType' is explicitly default, block.
                const isSelf = this.normalizeUserId(userId).toLowerCase() === this.normalizeUserId(this.currentUser.id).toLowerCase();
                if (this.currentUser.adminType === 'default' && isSelf) {
                    throw new Error("Default Admin password cannot be changed.");
                }

                // Double check target ID against Hardcoded Default
                const defaultAdminId = Security.deobfuscate(SECRETS.ADMIN_ID);
                if (this.normalizeUserId(userId).toLowerCase() === defaultAdminId.toLowerCase()) {
                    throw new Error("Default Admin password is immutable.");
                }

                // Allow Admin to change own password OR their own users' passwords
                if (!isSelf) {
                    const user = this.findUserById(userId);
                    if (!user || (user.createdBy !== this.currentUser.id && this.currentUser.adminType !== 'default')) throw new Error("Unauthorized: Can only change own or own user passwords.");
                }

                const hash = await Security.hash(newPassword);
                const idx = this.users.findIndex(u => this.normalizeUserId(u.id).toLowerCase() === this.normalizeUserId(userId).toLowerCase());
                if (idx !== -1) {
                    this.users[idx].password = hash;
                    // If updating self, update current session too
                    if (userId === this.currentUser.id) {
                        this.currentUser.password = hash;
                        sessionStorage.setItem(DB_KEYS.SESSION, JSON.stringify(this.currentUser));
                    }
                    this.saveUsers();
                    return true;
                }
                return false;
            },

            async updateAdminId(newId) {
                if (this.currentUser.role !== 'admin') throw new Error("Unauthorized");
                const normalizedId = this.normalizeUserId(newId);
                if (!normalizedId) throw new Error("Admin ID cannot be empty.");

                // 1. DEFAULT ADMIN - IMMUTABLE
                if (this.currentUser.adminType === 'default') {
                    throw new Error("Default Admin ID cannot be changed.");
                }

                if (this.findUserById(normalizedId)) throw new Error("ID already taken.");

                const oldId = this.currentUser.id;

                // 1. Update Admin Record
                const adminIdx = this.users.findIndex(u => u.id === oldId);
                if (adminIdx === -1) throw new Error("Admin record not found.");

                this.users[adminIdx].id = normalizedId;

                // 2. Migrate Child Users
                let migratedCount = 0;
                this.users.forEach(u => {
                    if (u.createdBy === oldId) {
                        u.createdBy = normalizedId;
                        migratedCount++;
                    }
                });

                // 3. Update Session
                this.currentUser.id = normalizedId;
                sessionStorage.setItem(DB_KEYS.SESSION, JSON.stringify(this.currentUser));

                this.saveUsers();
                return migratedCount;
            },

            // -- SELECTION METHODS --
            selectedRows: new Set(),

            toggleSelection(index) {
                if (this.selectedRows.has(index)) this.selectedRows.delete(index);
                else this.selectedRows.add(index);
                Router.render();
            },

            deleteSelected() {
                // Indices sort desc to avoid shifting issues
                const indices = Array.from(this.selectedRows).sort((a, b) => b - a);
                indices.forEach(idx => this.data.splice(idx, 1));
                this.selectedRows.clear();
                this.saveData();
                Router.render();
            },

            clearAll() {
                this.data = [];
                this.selectedRows.clear();
                this.saveData();
                Router.render();
            },

            addColumn(label, type, options = {}) {
                if (this.schema.some(c => c.label.trim().toLowerCase() === label.trim().toLowerCase())) {
                    throw new Error(`Column "${label}" already exists. Please use a different name.`);
                }
                const id = label.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now().toString().slice(-4);
                this.schema.push({ id, label, type, options });
                this.saveSchema();
                Router.render();
            },

            updateColumn(colId, newLabel, newType, newOptions) {
                const idx = this.schema.findIndex(c => c.id === colId);
                if (idx !== -1) {
                    if (this.schema.some((c, i) => i !== idx && c.label.trim().toLowerCase() === newLabel.trim().toLowerCase())) {
                        throw new Error(`Column "${newLabel}" already exists.`);
                    }

                    const updatedCol = { id: colId, label: newLabel, type: newType, options: newOptions };
                    this.schema[idx] = updatedCol;

                    // Retroactive Enforcement: Apply new rules to existing data
                    this.data.forEach(row => {
                        const val = row[colId];
                        if (val !== undefined && val !== null) {
                            row[colId] = this.cleanValue(val, updatedCol);
                        }
                    });

                    this.saveSchema();
                    this.saveData();
                    Router.render();
                }
            },

            reorderColumns(fromIndex, toIndex) {
                const item = this.schema.splice(fromIndex, 1)[0];
                this.schema.splice(toIndex, 0, item);
                this.saveSchema();
                Router.render();
            },

            deleteColumn(colId) {
                this.schema = this.schema.filter(c => c.id !== colId);
                this.saveSchema();
                Router.render();
            },

            addEntry(entryData) {
                // Central Data Cleaning
                const cleanedData = {};
                this.schema.forEach(col => {
                    cleanedData[col.id] = this.cleanValue(entryData[col.id], col);
                });

                // Validation: Unique Constraints
                this.schema.forEach(col => {
                    if (col.options?.unique) {
                        const val = cleanedData[col.id];
                        if ((val || val === 0) && this.data.some(d => d[col.id] === val)) {
                            throw new Error(`Duplicate value found for "${col.label}"`);
                        }
                    }
                });

                const newRecord = { id: Date.now(), ...cleanedData };
                this.data.push(newRecord);
                this.saveData();
                Router.render();
            },

            deleteEntry(recordId) {
                this.data = this.data.filter(d => d.id !== recordId);
                this.saveData();
                Router.render();
            },

            // --- UPDATE ENTRY (Reuse Validation) ---
            // --- UPDATE ENTRY (Reuse Validation) ---
            updateEntry(id, entryData) {
                // Central Cleaning (Partial Updates Support)
                const cleanedUpdates = {};
                Object.keys(entryData).forEach(key => {
                    const col = this.schema.find(c => c.id === key);
                    if (col) {
                        cleanedUpdates[key] = this.cleanValue(entryData[key], col);
                    } else {
                        cleanedUpdates[key] = entryData[key];
                    }
                });

                // Validation: Unique Constraints (Exclude Self)
                this.schema.forEach(col => {
                    if (col.options?.unique && cleanedUpdates.hasOwnProperty(col.id)) {
                        const val = cleanedUpdates[col.id];
                        // Check if ANYOTHER record has this value
                        if ((val || val === 0) && this.data.some(d => d.id !== id && d[col.id] === val)) {
                            throw new Error(`Duplicate value found for "${col.label}"`);
                        }
                    }
                });

                const idx = this.data.findIndex(d => d.id === id);
                if (idx === -1) throw new Error("Record not found.");

                // Update (Preserve ID and Metadata)
                this.data[idx] = { ...this.data[idx], ...cleanedUpdates };
                this.selectedRows.clear(); // Reset Selection
                this.saveData();
                Router.render();
            },

            getExportFileName(extension, isFilteredExport = false) {
                const rawName = (this.activeTab?.name || 'data').trim() || 'data';
                const safeName = rawName
                    .replace(/[<>:"/\\|?*\x00-\x1F]/g, '_')
                    .replace(/\s+/g, ' ')
                    .slice(0, 80)
                    .trim() || 'data';
                return `${safeName}${isFilteredExport ? '_filtered' : ''}.${extension}`;
            },

            downloadFile(content, fileName, mimeType) {
                const blob = new Blob([content], { type: `${mimeType};charset=utf-8` });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            },

            escapeCSVValue(value) {
                if (value === null || value === undefined) return '""';
                const text = String(value).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                return `"${text.replace(/"/g, '""')}"`;
            },

            escapeHTML(value) {
                return String(value ?? '').replace(/[&<>"']/g, char => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                }[char]));
            },

            exportCSV(dataToExport = null) {
                if (this.schema.length === 0) return;
                const isFilteredExport = Array.isArray(dataToExport);
                const sourceData = isFilteredExport ? dataToExport : this.data;
                const headers = this.schema.map(col => this.escapeCSVValue(col.label)).join(',');
                const rows = sourceData.map(row =>
                    this.schema.map(col => this.escapeCSVValue(row[col.id])).join(',')
                );
                this.downloadFile(
                    `\uFEFF${[headers, ...rows].join('\r\n')}`,
                    this.getExportFileName('csv', isFilteredExport),
                    'text/csv'
                );
            },

            exportJSON(dataToExport = null) {
                const isFilteredExport = Array.isArray(dataToExport);
                const sourceData = isFilteredExport ? dataToExport : this.data;
                this.downloadFile(
                    JSON.stringify(sourceData, null, 2),
                    this.getExportFileName('json', isFilteredExport),
                    'application/json'
                );
            },

            // --- PDF EXPORT HANDLER (Modular Structure) ---
            exportPDF(dataToExport = null) {
                const isFilteredExport = Array.isArray(dataToExport);
                const sourceData = isFilteredExport ? dataToExport : this.data;
                if (sourceData.length === 0) {
                    alert('No records to export.');
                    return;
                }

                // Minimal Print-to-PDF Implementation
                const printWindow = window.open('', '_blank', 'height=600,width=800');
                if (!printWindow) {
                    alert('Unable to open the print window. Please allow pop-ups and try again.');
                    return;
                }

                const title = `${this.activeTab?.name || 'data'} ${isFilteredExport ? '(Filtered)' : ''}`.trim();
                const safeTitle = this.escapeHTML(title);
                const headers = this.schema.map(c => `<th>${this.escapeHTML(c.label)}</th>`).join('');
                const rows = sourceData.map(r =>
                    `<tr>${this.schema.map(c => `<td>${this.escapeHTML(Router.formatValue(r[c.id], c))}</td>`).join('')}</tr>`
                ).join('');

                printWindow.document.write(`
                    <html>
                    <head>
                    <title>${safeTitle} - Export</title>
                        <style>
                            body { font-family: sans-serif; padding: 20px; }
                            table { width: 100%; border-collapse: collapse; }
                            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; white-space: pre-wrap; word-break: break-word; }
                            th { background: #f0f0f0; }
                            h1 { font-size: 1.5rem; margin-bottom: 1rem; }
                        </style>
                    </head>
                    <body>
                        <h1>${safeTitle}</h1>
                        <table>
                            <thead><tr>${headers}</tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </body>
                    </html>
                `);

                printWindow.document.close();
                printWindow.focus();

                // Delay print slightly to ensure render
                setTimeout(() => {
                    printWindow.onafterprint = () => printWindow.close();
                    printWindow.print();
                }, 500);
            }
        };

        // --- UI RENDERER ---
        const Router = {
            app: document.getElementById('app'),

            async init() {
                await State.init();

                // Security: Disable Context Menu
                document.addEventListener('contextmenu', event => event.preventDefault());

                this.render();
            },

            render() {
                this.app.innerHTML = '';
                if (!State.currentUser) {
                    this.renderLogin();
                } else {
                    this.renderDashboard();
                }
            },

            // Helper for Formatting
            formatValue(val, col) {
                if (!val && val !== 0) return '-';
                const opts = col.options || {};

                if (col.type === 'number') {
                    if (opts.numFormat === 'currency') {
                        const decimals = opts.decimalPlaces !== undefined && opts.decimalPlaces !== '' ? parseInt(opts.decimalPlaces) : 2;
                        return new Intl.NumberFormat('en-US', {
                            style: 'currency',
                            currency: opts.currency || 'USD',
                            minimumFractionDigits: decimals,
                            maximumFractionDigits: decimals
                        }).format(val);
                    } else if (opts.numFormat === 'decimal') {
                        const decimals = opts.decimalPlaces !== undefined && opts.decimalPlaces !== '' ? parseInt(opts.decimalPlaces) : 2;
                        return new Intl.NumberFormat('en-US', {
                            minimumFractionDigits: decimals,
                            maximumFractionDigits: decimals
                        }).format(val);
                    }
                } else if (col.type === 'date') {
                    const d = new Date(val);
                    if (isNaN(d.getTime())) return val;

                    if (opts.dateFormat === 'short') return d.toLocaleDateString(); // 1/31/2026
                    if (opts.dateFormat === 'long') return d.toLocaleDateString(undefined, { dateStyle: 'long' }); // January 31, 2026
                }
                return val;
            },

            // Helper for Input Parsing
            handleInputBlur(e, col) {
                const opts = col.options || {};

                // Auto Trim
                if (col.type === 'text' && opts.autoTrim) {
                    e.target.value = e.target.value.trim();
                }

                if (col.type === 'text' && opts.casing) {
                    if (opts.casing === 'upper') e.target.value = e.target.value.toUpperCase();
                    if (opts.casing === 'lower') e.target.value = e.target.value.toLowerCase();
                    if (opts.casing === 'title') {
                        e.target.value = e.target.value.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
                    }
                }
            },

            // Table DnD Handlers
            handleDragStart(e, index) {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', index);
                e.target.style.opacity = '0.5';
            },

            handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                return false;
            },

            handleDrop(e, toIndex) {
                e.stopPropagation();
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                if (fromIndex !== toIndex) {
                    State.reorderColumns(fromIndex, toIndex);
                }
                return false;
            },

            // Col Resize (Excel Style)
            isResizing: false,
            initColResize(e, col) {
                e.stopPropagation();
                // If double click, it's auto-fit. But standard click is drag.
                // We handle Auto-Fit separately via dblclick event.

                this.isResizing = true;
                const startX = e.clientX;
                const th = e.target.parentElement;
                const startWidth = th.getBoundingClientRect().width;

                document.body.classList.add('resizing-col'); // Cursor lock
                e.target.classList.add('active'); // Visual feedback

                const onMove = (moveEvent) => {
                    // Direct Update (No RAF) for 1:1 feel
                    const width = startWidth + (moveEvent.clientX - startX);
                    if (width > 30) {
                        th.style.width = width + 'px';
                    }
                };

                const onUp = (upEvent) => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.classList.remove('resizing-col');
                    e.target.classList.remove('active');

                    setTimeout(() => this.isResizing = false, 100);

                    const finalWidth = startWidth + (upEvent.clientX - startX);
                    if (finalWidth > 30) {
                        if (!col.options) col.options = {};
                        col.options.width = finalWidth;
                        State.saveSchema();
                        // We don't need full re-render, but to be safe and update all cells in column:
                        Router.render();
                    }
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            },

            // Auto-Fit Column
            autoFitColumn(col) {
                // measure logic
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = "14px Inter, sans-serif"; // Match CSS roughly

                let maxWidth = ctx.measureText(col.label).width + 40; // Header + padding + sort icon space

                // Check visible data
                // We use State.filteredData to only fit to what's seen (like Excel) or State.data? 
                // Excel fits to visible.
                const dataToCheck = State.activeTab.filters ? State.filteredData : State.data;

                // Limit check to first 1000 rows for performance if huge
                const limit = Math.min(dataToCheck.length, 1000);

                for (let i = 0; i < limit; i++) {
                    const row = dataToCheck[i];
                    const val = this.formatValue(row[col.id], col);
                    const w = ctx.measureText(val).width + 20; // Cell padding
                    if (w > maxWidth) maxWidth = w;
                }

                if (!col.options) col.options = {};
                col.options.width = Math.ceil(maxWidth);
                State.saveSchema();
                Router.render();
            },

            // Row Resize
            initRowResize(e) {
                e.stopPropagation();
                this.isResizing = true;

                const startY = e.clientY;
                const currentHeight = State.activeTab.rowHeight || 50; // Default

                document.body.classList.add('resizing-row');

                const onMove = (moveEvent) => {
                    requestAnimationFrame(() => {
                        const newHeight = currentHeight + (moveEvent.clientY - startY);
                        if (newHeight >= 20) {
                            // Update dynamic CSS var or styles? 
                            // For immediate feedback, we can set style on all TRs? Expensive.
                            // Or just one variable?
                            // Since we don't have a CSS var for row height, let's just wait for render?
                            // No, drag needs feedback. 
                            // Let's use a temporary CSS variable on the table or just update the current TR?
                            // Actually, updating ALL rows during drag might be heavy.
                            // Excel shows a "ghost" line or updates instantly. 
                            // Let's try updating a CSS variable: --row-height
                            document.documentElement.style.setProperty('--dynamic-row-height', newHeight + 'px');
                        }
                    });
                };

                const onUp = (upEvent) => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.classList.remove('resizing-row');
                    setTimeout(() => this.isResizing = false, 100);

                    const finalHeight = currentHeight + (upEvent.clientY - startY);
                    if (finalHeight >= 20) {
                        State.activeTab.rowHeight = finalHeight;
                        State.saveTabs();
                        Router.render();
                    }
                    document.documentElement.style.removeProperty('--dynamic-row-height');
                };

                // Set initial var for smooth transition if we use it
                document.documentElement.style.setProperty('--dynamic-row-height', currentHeight + 'px');

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            },

            openFilterPanel(col, btn) {
                // Close existing if any
                const existing = document.querySelector('.filter-panel');
                if (existing) existing.remove();

                const panel = document.createElement('div');
                panel.className = 'filter-panel';

                // Position logic
                const rect = btn.getBoundingClientRect();
                panel.style.top = (rect.bottom + 5) + 'px';
                panel.style.left = rect.left + 'px';

                // Prevent overflow right
                if (rect.left + 280 > window.innerWidth) {
                    panel.style.left = (window.innerWidth - 290) + 'px';
                }

                // 1. Data Preparation
                // Context-Aware Filter Values: Only show values allowed by OTHER filters
                let sourceData = State.data;
                if (State.activeTab.filters) {
                    sourceData = State.data.filter(row => {
                        return Object.entries(State.activeTab.filters).every(([k, allowed]) => {
                            if (k === col.id) return true; // Ignore self
                            if (!allowed) return true;
                            // Re-use logic from filteredData getter (simple includes)
                            const val = row[k];
                            const checkVal = (val === undefined || val === null) ? '' : val;
                            return allowed.includes(checkVal);
                        });
                    });
                }

                const allValues = [...new Set(sourceData.map(d => {
                    const v = d[col.id];
                    return (v === undefined || v === null) ? '' : v;
                }))].sort(); // Sort alphanumerically

                // Current Filter State
                // If filter exists, checked = values in filter
                // If filter doesn't exist, checked = ALL values
                const currentFilter = State.activeTab.filters?.[col.id];
                let checkedValues = currentFilter ? new Set(currentFilter) : new Set(allValues);

                // Sort State
                const currentSort = State.activeTab.sort;
                const isSortAsc = currentSort?.colId === col.id && currentSort.direction === 'asc';
                const isSortDesc = currentSort?.colId === col.id && currentSort.direction === 'desc';

                // HTML Structure
                panel.innerHTML = `
                    <div class="filter-panel-header">
                        <div id="filterDragHandle" style="font-weight:bold; font-size:0.95rem; text-align:center; padding-bottom:0.5rem; margin-bottom:0.5rem; border-bottom:1px solid var(--card-border); cursor:move; color:var(--primary); user-select:none;">
                            Filter: ${col.label}
                        </div>
                        <button class="filter-sort-btn" id="btnSortAsc" style="${isSortAsc ? 'background:rgba(255,255,255,0.1); font-weight:bold;' : ''}">
                            <span>🔼</span> Sort A to Z
                        </button>
                        <button class="filter-sort-btn" id="btnSortDesc" style="${isSortDesc ? 'background:rgba(255,255,255,0.1); font-weight:bold;' : ''}">
                            <span>🔽</span> Sort Z to A
                        </button>
                        ${currentSort?.colId === col.id ? `
                            <button class="filter-sort-btn" id="btnClearSort" style="color:var(--text-muted); border-top:1px solid var(--card-border); margin-top:0.25rem; padding-top:0.75rem;">
                                <span>⟲</span> Clear Sort
                            </button>
                        ` : ''}
                        ${currentFilter ? `
                            <button class="filter-sort-btn" id="btnClearThis" style="color:var(--danger)">
                                <span>✕</span> Clear Filter from "${col.label}"
                            </button>
                        ` : ''}
                        <input type="text" class="filter-search" placeholder="Search..." id="filterSearch">
                    </div>
                    <div class="filter-list" id="filterList">
                        <label class="filter-item">
                            <input type="checkbox" id="chkSelectAll" ${currentFilter ? '' : 'checked'}>
                            <span style="font-weight:600">(Select All)</span>
                        </label>
                        <div id="filterItemsContainer"></div>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-ghost" id="btnCancelFilter">Cancel</button>
                        <button class="btn btn-primary" id="btnApplyFilter">OK</button>
                    </div>
                `;

                // Render List Wrapper
                const listContainer = panel.querySelector('#filterItemsContainer');
                const renderList = (filterText = '') => {
                    listContainer.innerHTML = '';
                    const lowerFilter = filterText.toLowerCase();

                    allValues.forEach(val => {
                        const displayVal = val === '' ? '(Blanks)' : val; // Raw value
                        // For display, maybe format?
                        const formattedVal = Router.formatValue(val, col);
                        const strVal = String(formattedVal);

                        if (strVal.toLowerCase().includes(lowerFilter)) {
                            const lbl = document.createElement('label');
                            lbl.className = 'filter-item';
                            // Checked logic: is it in the current DRAFT checked set?
                            const isChecked = checkedValues.has(val);
                            lbl.innerHTML = `
                                <input type="checkbox" value="${String(val)}" ${isChecked ? 'checked' : ''}>
                                <span style="margin-left:0.5rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${strVal === '' ? '(Blanks)' : strVal}</span>
                            `;

                            // Checkbox Change -> Update DRAFT Set
                            lbl.querySelector('input').addEventListener('change', (e) => {
                                if (e.target.checked) checkedValues.add(val);
                                else checkedValues.delete(val);

                                // Update Select All State
                                const allChk = panel.querySelector('#chkSelectAll');
                                if (checkedValues.size === allValues.length) {
                                    allChk.checked = true;
                                    allChk.indeterminate = false;
                                } else if (checkedValues.size === 0) {
                                    allChk.checked = false;
                                    allChk.indeterminate = false;
                                } else {
                                    allChk.checked = false;
                                    allChk.indeterminate = true;
                                }
                            });
                            listContainer.appendChild(lbl);
                        }
                    });
                };
                renderList();

                // Drag Logic
                const dragHandle = panel.querySelector('#filterDragHandle');
                let isDragging = false;
                let startX, startY, initialLeft, initialTop;

                dragHandle.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialLeft = panel.offsetLeft;
                    initialTop = panel.offsetTop;
                    dragHandle.style.cursor = 'grabbing';
                    e.preventDefault(); // Prevent text selection
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    panel.style.left = (initialLeft + dx) + 'px';
                    panel.style.top = (initialTop + dy) + 'px';
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        dragHandle.style.cursor = 'move';
                    }
                });

                // Select All Handler
                const chkSelectAll = panel.querySelector('#chkSelectAll');
                // Set initial indeterminate state
                if (checkedValues.size > 0 && checkedValues.size < allValues.length) chkSelectAll.indeterminate = true;

                chkSelectAll.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        checkedValues = new Set(allValues);
                        // Visually check all visible? Or all values? 
                        // Excel: Select all selects matches of search, or all if no search. 
                        // Simplification: Select All means ALL values in the column.
                        renderList(panel.querySelector('#filterSearch').value);
                    } else {
                        checkedValues.clear();
                        renderList(panel.querySelector('#filterSearch').value);
                    }
                });

                // Search Handler
                panel.querySelector('#filterSearch').addEventListener('input', (e) => {
                    renderList(e.target.value);
                });

                // Actions
                panel.querySelector('#btnSortAsc').onclick = () => { State.setSort(col.id, 'asc'); panel.remove(); };
                panel.querySelector('#btnSortDesc').onclick = () => { State.setSort(col.id, 'desc'); panel.remove(); };

                const btnClearSort = panel.querySelector('#btnClearSort');
                if (btnClearSort) btnClearSort.onclick = () => {
                    State.setSort(col.id, null); // Clear Sort Only
                    panel.remove();
                };

                const btnClear = panel.querySelector('#btnClearThis');
                if (btnClear) btnClear.onclick = () => {
                    State.clearFilter(col.id);
                    // Do NOT clear sort implicitly
                    panel.remove();
                };

                panel.querySelector('#btnCancelFilter').onclick = () => panel.remove();

                panel.querySelector('#btnApplyFilter').onclick = () => {
                    // Logic:
                    // If checkedValues == allValues, filter is REMOVED (or effectively all).
                    // We save cleaner state if we just remove the filter property.
                    if (checkedValues.size === allValues.length) {
                        State.setFilter(col.id, null);
                    } else {
                        State.setFilter(col.id, Array.from(checkedValues));
                    }
                    panel.remove();
                };

                // Click Outside to Close
                // Use a timeout to avoid immediate trigger from the button click
                setTimeout(() => {
                    const closeHandler = (e) => {
                        if (!panel.contains(e.target) && !btn.contains(e.target)) {
                            panel.remove();
                            document.removeEventListener('click', closeHandler);
                        }
                    };
                    document.addEventListener('click', closeHandler);
                }, 10);

                document.body.appendChild(panel);
            },

                        fieldWrapper.addEventListener('drop', (e) => this.handleDrop(e, index));

                        fieldWrapper.innerHTML = `
                            <div class="flex justify-between items-center mb-1">
                                <label class="label" style="margin-bottom:0;">
                                    ${col.label}
                                    ${col.options?.required ? '<span style="color:#ef4444; margin-left:0.1rem;">*</span>' : ''}
                                </label>
                                <div>
                                    <button type="button" class="btn-icon edit-col-btn" title="Edit" style="margin-right:0.5rem; font-size:0.9rem;">✏️</button>
